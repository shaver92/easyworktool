services:
  - type: web
    name: family-expense-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_VERIFICATION_TOKEN
        sync: false
      - key: APP_DB_PATH
        value: /app/data/family_expenses.db
    disk:
      name: bot-data
      mountPath: /app/data
      sizeGB: 1
